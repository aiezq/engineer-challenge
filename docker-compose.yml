services:
  database:
    image: postgres:15-alpine
    container_name: orbitto-db
    environment:
      POSTGRES_USER: orbitto_user
      POSTGRES_PASSWORD: orbitto_password
      POSTGRES_DB: orbitto_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitto_user -d orbitto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orbitto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend and Frontend services will be added here later once their Dockerfiles are ready
  # backend:
  #   build:
  #     context: ./backend
  # frontend:
  #   build:
  #     context: ./frontend

volumes:
  db_data:
  redis_data:
