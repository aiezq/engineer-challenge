services:
  database:
    image: postgres:15-alpine
    container_name: orbitto-db
    environment:
      POSTGRES_USER: orbitto_user
      POSTGRES_PASSWORD: orbitto_password
      POSTGRES_DB: orbitto_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitto_user -d orbitto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orbitto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: orbitto-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://orbitto_user:orbitto_password@database:5432/orbitto_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: local-dev-secret-key
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: orbitto-frontend
    environment:
      GRAPHQL_URL: http://backend:8000/graphql
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
